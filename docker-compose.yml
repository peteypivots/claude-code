services:
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-code:latest
    container_name: claude-code-instance
    # ── Promtail Labels for Log Aggregation ────────────────
    labels:
      logging: promtail
      logging_job: claude-code
    
    # Environment & API Key ──────────────────────────────
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_AUTH_TOKEN: "skip"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      YAK_NODE_NAME: ${YAK_NODE_NAME:-claude-code-1}
      YAK_MASTER_HOST: ${YAK_MASTER_HOST:-localhost}
            
      # ── Sandbox Mode (allow --dangerously-skip-permissions as root) ──
      IS_SANDBOX: "1"
      
      # ── Ollama Configuration (Local-first Strategy) ────
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120000}
      OLLAMA_RETRIES: ${OLLAMA_RETRIES:-3}
      
      # ── SearXNG Web Search (for local models) ──────────
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      
      # ── Meta AI MCP (web research via Meta AI) ─────────
      META_AI_MCP_URL: ${META_AI_MCP_URL:-http://meta-ai-mcp:8099}
      
      # ── LanceDB Vector Store (research memory + dedup) ──
      LANCEDB_URI: ${LANCEDB_URI:-http://lancedb-api:8000}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      
      # ── LLM Provider Selection ─────────────────────────
      LLM_PRIMARY_PROVIDER: ${LLM_PRIMARY_PROVIDER:-ollama}
      LLM_SECONDARY_PROVIDER: ${LLM_SECONDARY_PROVIDER:-anthropic}
      LLM_ENABLE_FALLBACK: ${LLM_ENABLE_FALLBACK:-true}
      LLM_LOG_PROVIDER: ${LLM_LOG_PROVIDER:-false}
      CLAUDE_CODE_COORDINATOR_MODE: ${CLAUDE_CODE_COORDINATOR_MODE:-0}
      
      # ── Compound AI System (enables local-first routing) ──
      LOCAL_FIRST: ${LOCAL_FIRST:-false}
      USE_LLM_ORCHESTRATOR: ${USE_LLM_ORCHESTRATOR:-false}
      ROUTER_CACHE_TTL_MS: ${ROUTER_CACHE_TTL_MS:-300000}
      ROUTER_VERBOSE: "true"
      POOL_VERBOSE: "true"
      
      # ── Model Configuration (from .env) ────────────────
      ORCHESTRATOR_MODEL: ${ORCHESTRATOR_MODEL:-claude-explorer:v7}
      LOCAL_MODEL: ${LOCAL_MODEL:-qwen2.5:14b-instruct}
      REASONING_MODEL: ${REASONING_MODEL:-deepseek-r1:7b}
      SIDE_QUERY_OLLAMA_MODEL: ${SIDE_QUERY_OLLAMA_MODEL:-claude-explorer:v7}
      DREAM_MODEL: ${DREAM_MODEL:-qwen2.5:7b-instruct}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_MODEL_OPUS: ${OLLAMA_MODEL_OPUS:-}
      
      # ── Adaptive Temperature (retry with increased creativity) ──
      ORCHESTRATOR_TEMPERATURE: ${ORCHESTRATOR_TEMPERATURE:-0}
      ORCHESTRATOR_TEMP_STEP: ${ORCHESTRATOR_TEMP_STEP:-0.2}
      ORCHESTRATOR_MAX_TEMP: ${ORCHESTRATOR_MAX_TEMP:-0.7}
      
      # ── Reasoning Configuration (problem-type temps + caching) ──
      REASONING_BASE_TEMP: ${REASONING_BASE_TEMP:-0.1}
      REASONING_CACHE_TTL_MS: ${REASONING_CACHE_TTL_MS:-1800000}
      REASONING_CACHE_ENABLED: ${REASONING_CACHE_ENABLED:-true}
      
      # ── Context Window ─────────────────────────────────
      # Don't set by default - let each model's Modelfile control its context size
      # Set explicitly only if you need to override (e.g., OLLAMA_NUM_CTX=8192)
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-}
      # Use minimal tool descriptions for pre-trained models (saves tokens)
      OLLAMA_MINIMAL_TOOL_DESC: ${OLLAMA_MINIMAL_TOOL_DESC:-false}
      # Debug: log raw Ollama responses
      OLLAMA_DEBUG: ${OLLAMA_DEBUG:-true}
      OLLAMA_DEBUG_FULL_REQUEST: ${OLLAMA_DEBUG_FULL_REQUEST:-true}
      OLLAMA_DEBUG_LOG_FILE: ${OLLAMA_DEBUG_LOG_FILE:-/data/logs/router-debug.log}
      OLLAMA_DEBUG_UI_LOG_FILE: ${OLLAMA_DEBUG_UI_LOG_FILE:-/data/logs/claude-debug.log}
      OLLAMA_NATIVE_TOOLS: ${OLLAMA_NATIVE_TOOLS:-false}
      OLLAMA_MODEL_SONNET: ${OLLAMA_MODEL_SONNET:-}
      OLLAMA_MODEL_HAIKU: ${OLLAMA_MODEL_HAIKU:-}
      
      # ── Training Data Capture (collects v7 examples for fine-tuning) ──
      TRAINING_CAPTURE: ${TRAINING_CAPTURE:-true}
      TRAINING_CAPTURE_VERBOSE: ${TRAINING_CAPTURE_VERBOSE:-false}
    
    # ── Volume Mounts for Yak Integration & Data ───────────
    volumes:
      # Yaknode binary and configuration
      - /home/ables/gitroot/docker_scripts/yaknode:/opt/yaksoft/yaknode:ro
      - /home/ables/gitroot/docker_scripts/host.key:/opt/yaksoft/host.key:ro
      - /home/ables/gitroot/docker_scripts/yak-libs:/opt/yaksoft/libs:ro
      - /home/ables/gitroot/docker_scripts/yak-init.sh:/usr/local/bin/yak-init.sh:ro
      
      # Claude Code data persistence
      - claude-data:/data
      - ./.docker-persist/logs:/data/logs
      - claude-home:/root/.claude
      - claude-config:/root/.config/claude
      - claude-cache:/root/.cache/claude
      # Global config file (NOT inside .claude/ directory - separate file at ~/)
      - ./.docker-persist/.claude.json:/root/.claude.json
      
      # SSH/Git keys (optional)
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      
      # os-eco integration (canopy prompts, mulch expertise, seeds issues, overstory orchestration)
      - ./.canopy:/app/.canopy:ro
      - ./.mulch:/app/.mulch       # rw needed for mulch learn/sync
      - ./.seeds:/app/.seeds       # rw needed for sd close/create
      - ./.overstory:/app/.overstory  # rw needed for ov logs
      - ./.claude:/app/.claude
      - ./.git:/app/.git:ro        # git repo for mulch diff, sd sync
      
      # ── Development: Source files for hot-reload (TypeScript, shell scripts) ──
      - ./src/services/llm:/app/src/services/llm  # trainingCapture.ts, queryModelRouter.ts
      - ./scripts:/app/scripts                    # shell scripts auto-sync
    
    # ── Logging Configuration ──────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"    
    # ── Resource Limits ────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    # ── Host Access (for meta-ai-mcp and other host services) ──
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Networking ─────────────────────────────────────────
    networks:
      - claude-network
      - ollama_default  # Connect to Ollama's network for direct access
      - lancedb-network  # Connect to LanceDB for research memory
    
    # ── Port Mappings ──────────────────────────────────────
    ports:
      - "3003:3000"  # Next.js dev server (web UI) - moved from 3000 for Grafana
      - "4001:4001"  # Vite preview
      - "5174:5173"  # Vite dev server
    
    # ── Restart Policy ────────────────────────────────────
    restart: unless-stopped
    # Starts the market monitor agent in the background
    # To control it, use:
    #   docker exec claude-code-instance touch /tmp/agent-monitor-default-stop  (stop)
    #   docker exec claude-code-instance tail -f /tmp/agent-monitor-default.log (logs)
    
    # ── Entrypoint with Yak Support ──
    entrypoint: /usr/local/bin/yak-init.sh
    command: ["sleep", "infinity"]

    # Keep container running
    stdin_open: true
    tty: true


# ── Named Volumes for Persistence ──────────────────────
volumes:
  claude-data:
    driver: local
  claude-home:
    driver: local
  claude-config:
    driver: local
  claude-cache:
    driver: local

# ── Networks ───────────────────────────────────────────
networks:
  claude-network:
    driver: bridge
  ollama_default:  # External network where Ollama runs
    external: true
    name: ollama_default
  lancedb-network:  # External network where LanceDB runs
    external: true
    name: lancedb-network
